<div class="flex flex-col md:flex-row items-center gap-6 w-full min-w-0">

  <div class="relative w-40 h-40 flex-shrink-0">
    <canvas #chartCanvas></canvas>
    <div class="absolute inset-0 flex flex-col items-center justify-center pointer-events-none px-2">
      <span class="text-xs text-gray-400">Ümumi xərc</span>
      <span class="font-display font-bold text-navy tabular-nums text-sm">
        {{ totalExpense() | currency:'AZN':'symbol':'1.0-0' }}
      </span>
    </div>
  </div>

  <div class="flex-1 w-full min-w-0 flex flex-col gap-2">
    @for (item of categoryBreakdown(); track item.category) {
      <div class="grid grid-cols-[auto_1fr_auto_auto] items-center gap-x-2 text-sm">
        <span class="w-2 h-2 rounded-full flex-shrink-0" [style.background-color]="item.color"></span>
        <span class="text-gray-700 truncate">{{ item.category }}</span>
        <span class="font-medium tabular-nums text-navy text-right">{{ item.percentage }}%</span>
        <span class="text-gray-400 tabular-nums text-right w-16">{{ item.amount | currency:'AZN':'symbol':'1.0-0' }}</span>
      </div>
    }
  </div>

</div>
