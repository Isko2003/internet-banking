<div class="relative bg-gradient-to-br from-navy to-navy-dark text-white rounded-2xl p-5 overflow-hidden shadow-md cursor-pointer transition-all duration-300 ease-in-out hover:-translate-y-1.5 hover:scale-[1.02] border border-transparent hover:border-white/20">
      <div class="absolute -right-8 -top-8 w-32 h-32 rounded-full bg-white/5"></div>
        <div class="relative">
            <div class="flex items-start justify-between mb-4">
            <div>
                <p class="font-display font-semibold text-base">{{ card.paymentSystem }}</p>
                <p class="text-xs text-white/50 mt-0.5">{{ card.type }}</p>
            </div>
            <div class="flex items-center gap-2">
                @if (card.contactless) {
                <svg class="w-4 h-4 text-white/50" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.111 16.404a5.5 5.5 0 017.778 0M12 20h.01M4.929 12.929a9 9 0 0114.142 0" />
                </svg>
                }
                <span
                class="text-xs px-2 py-0.5 rounded-full font-medium"
                [class.bg-mint-light]="card.status === 'active'"
                [class.text-mint]="card.status === 'active'"
                [class.bg-red-50]="card.status === 'blocked'"
                [class.text-expense]="card.status === 'blocked'"
                [class.bg-gray-100]="card.status === 'expired'"
                [class.text-gray-500]="card.status === 'expired'"
                [class.bg-purple-50]="card.status === 'pending activation'"
                [class.text-purple-600]="card.status === 'pending activation'"
                >
                {{ card.status }}
                </span>
            </div>
            </div>

            <p class="text-xl font-mono tracking-widest mb-4">{{ card.number }}</p>

            <div class="flex items-end justify-between">
            <div>
                <p class="text-[10px] text-white/40 uppercase tracking-wide">Kart sahibi</p>
                <p class="text-sm font-medium mt-0.5">{{ card.holderName }}</p>
            </div>
            <div class="text-right">
                <p class="text-[10px] text-white/40 uppercase tracking-wide">Bitmə tarixi</p>
                <p class="text-sm font-medium mt-0.5">{{ card.expiry }}</p>
            </div>
            </div>

            <div class="mt-5 pt-4 border-t border-white/10">
            <p class="text-[10px] text-white/40 uppercase tracking-wide">Balans</p>
            <p class="font-display text-2xl font-bold tabular-nums mt-0.5">
                {{ card.balance | currency:'AZN':'symbol':'1.2-2' }}
            </p>
            </div>
        </div>
    </div>
